apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.cilium.io/
    chart: cilium
    targetRevision: 1.16.6
    helm:
      values: |
        kubeProxyReplacement: false
        cni:
          exclusive: false
        ipam:
          mode: cluster-pool
          operator:
            clusterPoolIPv4PodCIDRList: 10.42.0.0/16
            clusterPoolIPv4MaskSize: 24
        hubble:
          enabled: true
          relay:
            enabled: true
          ui:
            enabled: true
          metrics:
            enabled: "{dns,drop,tcp,flow,icmp,http}"
        bpf:
          masquerade: false
        autoDirectNodeRoutes: true
        routingMode: native
        ipv4NativeRoutingCIDR: 10.42.0.0/16
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - Replace=true  # Cilium 需要 Replace 策略
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
