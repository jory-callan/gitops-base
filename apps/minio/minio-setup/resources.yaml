# ── MinIO 初始化配置（声明式用户/策略/匿名权限）──
# 在 Tenant 创建桶后运行，确保用户和权限与 Git 声明一致
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: minio-setup-script
  namespace: minio
data:
  setup.sh: |
    #!/bin/sh
    set -e

    MC_ALIAS="local"
    MC_HOST="http://minio.minio.svc.cluster.local:80"
    ROOT_USER="minioadmin"
    ROOT_PASS="minioadmin"

    # ── 等待 MinIO 就绪 ────────────────────────────
    echo "⏳ Waiting for MinIO to be ready..."
    for i in $(seq 1 30); do
      if mc alias set $MC_ALIAS $MC_HOST $ROOT_USER $ROOT_PASS >/dev/null 2>&1; then
        echo "✅ MinIO is ready"
        break
      fi
      echo "   attempt $i/30, retrying in 5s..."
      sleep 5
    done

    # ── 工具函数：幂等创建用户 ───────────────────────
    create_user() {
      local USERNAME=$1
      local PASSWORD=$2
      local POLICY=$3
      if mc admin user info $MC_ALIAS $USERNAME >/dev/null 2>&1; then
        echo "   user $USERNAME already exists, skipping"
      else
        mc admin user add $MC_ALIAS $USERNAME $PASSWORD
        echo "   ✅ user $USERNAME created"
      fi
      mc admin policy set $MC_ALIAS $POLICY user=$USERNAME 2>/dev/null || \
        mc admin policy attach $MC_ALIAS $POLICY --user $USERNAME
      echo "   ✅ policy $POLICY bound to $USERNAME"
    }

    create_policy() {
      local NAME=$1
      local FILE=$2
      # mc admin policy create is idempotent (overwrites if exists)
      mc admin policy create $MC_ALIAS $NAME $FILE 2>&1 || true
      echo "   ✅ policy $NAME ensured"
    }

    # ── 创建策略 ────────────────────────────────────
    echo "📋 Setting up policies..."

    POLICY_DIR="/tmp/policies"
    mkdir -p $POLICY_DIR

    # env-test: 完全控制
    cat > $POLICY_DIR/env-test.json << 'POLICY'
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Effect": "Allow",
          "Action": ["s3:*"],
          "Resource": ["arn:aws:s3:::env-test", "arn:aws:s3:::env-test/*"]
        }
      ]
    }
    POLICY
    create_policy env-test-policy $POLICY_DIR/env-test.json

    # public: 完全控制
    cat > $POLICY_DIR/public.json << 'POLICY'
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Effect": "Allow",
          "Action": ["s3:*"],
          "Resource": ["arn:aws:s3:::public", "arn:aws:s3:::public/*"]
        }
      ]
    }
    POLICY
    create_policy public-rw-policy $POLICY_DIR/public.json

    # public-read: 只读
    cat > $POLICY_DIR/public-read.json << 'POLICY'
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Effect": "Allow",
          "Action": ["s3:GetObject", "s3:ListBucket", "s3:GetBucketLocation"],
          "Resource": ["arn:aws:s3:::public-read", "arn:aws:s3:::public-read/*"]
        }
      ]
    }
    POLICY
    create_policy public-read-policy $POLICY_DIR/public-read.json

    # ── 创建用户并绑定策略 ──────────────────────────
    echo "👤 Setting up users..."
    create_user "env-test-user"    "et-s3k-9f8a2c7d4e1b"  "env-test-policy"
    create_user "public-rw-user"   "pr-s3k-3b6f9a2c7d1e"  "public-rw-policy"
    create_user "public-read-user" "prd-s3k-5a8c2e7d4b1f" "public-read-policy"

    # ── 设置桶匿名权限 ──────────────────────────────
    echo "🌐 Setting up anonymous bucket policies..."

    # 先检查桶是否存在
    for bucket_name in env-test public public-read; do
      if ! mc ls $MC_ALIAS/$bucket_name >/dev/null 2>&1; then
        echo "   bucket $bucket_name not found yet, creating..."
        mc mb $MC_ALIAS/$bucket_name --ignore-existing
      fi
    done

    # 已经存在的设为匿名（幂等，多次执行无害）
    mc anonymous set public $MC_ALIAS/public 2>&1 || true
    echo "   ✅ public bucket: anonymous RW (public)"
    mc anonymous set download $MC_ALIAS/public-read 2>&1 || true
    echo "   ✅ public-read bucket: anonymous R (download)"
    # env-test 不设匿名，保持私有
    echo "   ✅ env-test bucket: private (no anonymous access)"

    echo ""
    echo "🎉 MinIO setup complete!"
    echo "   env-test   → user: env-test-user    (private)"
    echo "   public     → user: public-rw-user    (public RW)"
    echo "   public-read → user: public-read-user (public R)"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-setup
  namespace: minio
  labels:
    app: minio
    app.kubernetes.io/instance: minio
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc-setup
          image: minio/mc:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - /setup/setup.sh
          volumeMounts:
            - name: script
              mountPath: /setup
      volumes:
        - name: script
          configMap:
            name: minio-setup-script
            defaultMode: 0755
