apiVersion: minio.min.io/v2
kind: Tenant
metadata:
  name: minio
  namespace: minio
  labels:
    app: minio
spec:
  # ── quay.io 镜像（已验证可正常拉取）────
  image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
  imagePullPolicy: IfNotPresent

  credsSecret:
    name: minio-creds

  pools:
    - servers: 1
      volumesPerServer: 4
      volumeClaimTemplate:
        metadata:
          name: data
        spec:
          storageClassName: nfs-client
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi

  mountPath: /export
  subPath: /data
  requestAutoCert: false
  podManagementPolicy: OrderedReady

  # ── 默认桶 ─────────────────────────────────────
  buckets:
    - name: velero
      region: us-east-1
    - name: thanos
      region: us-east-1
    - name: loki
      region: us-east-1

  # ── 资源限制（降低 CPU request 以便在集群中调度）──
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
