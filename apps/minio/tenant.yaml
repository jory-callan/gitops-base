apiVersion: minio.min.io/v2
kind: Tenant
metadata:
  name: minio
  namespace: minio
  labels:
    app: minio
spec:
  # ── quay.io 镜像（已验证可正常拉取）────
  image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
  imagePullPolicy: IfNotPresent

  # v7.x 使用 configuration.name 引用 config.env 格式的 Secret
  configuration:
    name: minio-env-config

  # ── 健康层 ───────────────────────────────────
  livenessProbe:
    httpGet:
      path: /minio/health/live
      port: 9000
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 5
  readinessProbe:
    httpGet:
      path: /minio/health/ready
      port: 9000
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  startupProbe:
    httpGet:
      path: /minio/health/live
      port: 9000
    initialDelaySeconds: 3
    periodSeconds: 5
    failureThreshold: 60  # 5 分钟超时等待首次启动

  # ── 退出层 ───────────────────────────────────
  # NFS 环境下数据刷盘需要时间，给足够宽限期
  terminationGracePeriodSeconds: 60

  # ── 环境变量 ─────────────────────────────────
  env:
    - name: MINIO_PROMETHEUS_AUTH_TYPE
      value: "public"
    - name: MINIO_STORAGE_CLASS_STANDARD
      value: "EC:0"
    - name: MINIO_STORAGE_CLASS_RRS
      value: "EC:0"

  # ── Pod 元数据 ───────────────────────────────
  # VMagent 通过 label 发现 ServiceMonitor
  metadata:
    labels:
      app: minio
      app.kubernetes.io/name: minio
      app.kubernetes.io/instance: minio

  pools:
    - name: pool-0
      servers: 1
      volumesPerServer: 4
      volumeClaimTemplate:
        metadata:
          name: data
        spec:
          storageClassName: nfs-client
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi
      # ── 资源限制（降低 CPU request 以便在集群中调度）──
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi

  mountPath: /export
  subPath: /data
  requestAutoCert: false
  podManagementPolicy: OrderedReady

  # ── 默认桶 ─────────────────────────────────────
  buckets:
    - name: velero
      region: us-east-1
    - name: thanos
      region: us-east-1
    - name: loki
      region: us-east-1
    - name: victorial-logs
      region: us-east-1
    - name: victorial-metrics
      region: us-east-1
    - name: env-test
      region: us-east-1
    - name: public
      region: us-east-1
    - name: public-read
      region: us-east-1
    - name: vm-metrics
      region: us-east-1
    - name: vm-logs
      region: us-east-1
