# Victoria Metrics K8s Stack Helm values
# Referenced by argocd/victoria-metrics/application.yaml via $values/apps/victoria-metrics/values.yaml

# ── VictoriaMetrics Operator ────────────────────────────
victoria-metrics-operator:
  enabled: true
  operator:
    # Prometheus ServiceMonitor/PodMonitor → VMServiceScrape 自动转换
    disable_prometheus_converter: false
  serviceMonitor:
    enabled: true

# ── VMAgent（指标采集器）────────────────────────────────
vmagent:
  enabled: true
  spec:
    selectAllByDefault: true
    scrapeInterval: 20s
    port: "8429"
    extraArgs:
      promscrape.streamParse: "true"

# ── VMSingle（指标存储 + API 查询）─────────────────────
vmsingle:
  enabled: true
  spec:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: internal-ca
    ingressClassName: nginx
    hosts:
      - metrics.czw-sre.internal
    tls:
      - secretName: vm-metrics-tls
        hosts:
          - metrics.czw-sre.internal

# Disable heavyweight cluster components
vmcluster:
  enabled: false
vmalert:
  enabled: false
vmalertmanager:
  enabled: false

# Node metrics
node-exporter:
  enabled: true

# Kubernetes state metrics
kube-state-metrics:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ── 控制平面组件抓取 ──────────────────────────────────
# 禁用 kube-controller-manager Service 创建
# 名称超 63 字符（K8s DNS Label 限制）
kubeControllerManager:
  enabled: true
  service:
    enabled: false

# Grafana
grafana:
  enabled: true
  adminPassword: admin123
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: internal-ca
    hosts:
      - grafana.czw-sre.internal
    tls:
      - hosts:
          - grafana.czw-sre.internal
        secretName: grafana-tls
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  defaultDashboardsTimezone: Asia/Shanghai
  # ── VictoriaLogs 数据源 ──────────────────────────────
  # 如启用需加 readinessProbe.initialDelaySeconds: 180
  # plugins:
  #   - victoriametrics-logs-datasource
  # additionalDataSources:
  #   - name: VictoriaLogs
  #     type: victoriametrics-logs-datasource
  #     access: proxy
  #     url: http://victoria-logs-victoria-logs-single-server.victorialogs.svc:9428
  sidecar:
    datasources:
      enabled: false
    dashboards:
      enabled: false
