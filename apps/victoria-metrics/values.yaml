# Victoria Metrics K8s Stack Helm values
# Referenced by argocd/victoria-metrics/application.yaml via $values/apps/victoria-metrics/values.yaml

# ── VictoriaMetrics Operator ────────────────────────────
# 控制 CRD 转换器、ServiceMonitor 兼容等行为
victoria-metrics-operator:
  enabled: true
  operator:
    # Prometheus ServiceMonitor/PodMonitor → VMServiceScrape 自动转换
    # 关闭此选项：disable_prometheus_converter: true
    disable_prometheus_converter: false
  serviceMonitor:
    # 为 operator 自身创建 ServiceMonitor（需先安装 CRD）
    enabled: true

# ── VMAgent（指标采集器）────────────────────────────────
vmagent:
  enabled: true
  spec:
    selectAllByDefault: true          # 自动发现所有 VMServiceScrape
    scrapeInterval: 20s
    port: "8429"
    extraArgs:
      promscrape.streamParse: "true"

# ── VMSingle（指标存储，单节点）─────────────────────────
vmsingle:
  enabled: true
  spec:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

# Disable heavyweight cluster components
vmcluster:
  enabled: false
vmalert:
  enabled: false
vmalertmanager:
  enabled: false

# Node metrics
node-exporter:
  enabled: true

# Kubernetes state metrics
kube-state-metrics:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Grafana dashboards
grafana:
  enabled: true
  adminPassword: admin123
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: internal-ca
    hosts:
      - grafana.czw-sre.internal
    tls:
      - hosts:
          - grafana.czw-sre.internal
        secretName: grafana-tls
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  defaultDashboardsTimezone: Asia/Shanghai
  plugins:
    - victoriametrics-logs-datasource
  additionalDataSources:
    - name: VictoriaLogs
      type: victoriametrics-logs-datasource
      access: proxy
      url: http://victoria-logs-victoria-logs-single-server.victorialogs.svc:9428
