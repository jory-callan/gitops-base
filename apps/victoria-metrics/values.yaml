# Victoria Metrics K8s Stack Helm values
# Referenced by argocd/victoria-metrics/application.yaml via $values/apps/victoria-metrics/values.yaml

# ── VictoriaMetrics Operator ────────────────────────────
victoria-metrics-operator:
  enabled: true
  operator:
    # Prometheus ServiceMonitor/PodMonitor → VMServiceScrape 自动转换
    disable_prometheus_converter: false
  serviceMonitor:
    enabled: true

# ── VMAgent（指标采集器）────────────────────────────────
vmagent:
  enabled: true
  spec:
    selectAllByDefault: true
    scrapeInterval: 20s
    port: "8429"
    extraArgs:
      promscrape.streamParse: "true"

# ── VMSingle（指标存储 + API 查询）─────────────────────
vmsingle:
  enabled: true
  spec:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: internal-ca
    ingressClassName: nginx
    hosts:
      - metrics.czw-sre.internal
    tls:
      - secretName: vm-metrics-tls
        hosts:
          - metrics.czw-sre.internal

# Disable heavyweight cluster components
vmcluster:
  enabled: false
vmalert:
  enabled: false
vmalertmanager:
  enabled: false

# Node metrics
node-exporter:
  enabled: true

# Kubernetes state metrics
kube-state-metrics:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ── 控制平面组件抓取 ──────────────────────────────────
# 禁用 kube-controller-manager Service 创建
# 名称超 63 字符（K8s DNS Label 限制）
kubeControllerManager:
  enabled: true
  service:
    enabled: false

# Grafana
grafana:
  enabled: true
  adminPassword: admin123
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: internal-ca
    hosts:
      - grafana.czw-sre.internal
    tls:
      - hosts:
          - grafana.czw-sre.internal
        secretName: grafana-tls
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  defaultDashboardsTimezone: Asia/Shanghai

  # ── Dashboard 侧车 ───────────────────────────────────
  sidecar:
    datasources:
      enabled: false
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"

  # ── VictoriaLogs 数据源（声明式）─────────────────────
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: VictoriaLogs
          type: victoriametrics-logs-datasource
          access: proxy
          url: http://victoria-logs-victoria-logs-single-server.victorialogs.svc:9428
          isDefault: false

  # ── Grafana 配置（grafana.ini）────────────────────────
  grafana.ini:
    plugins:
      # 该插件为社区/商业插件，未经 Grafana Labs 签名
      # 设置此项允许加载未签名插件
      allow_loading_unsigned_plugins: victoriametrics-logs-datasource

  # ── 插件安装（GitHub 国内不可达，用 initContainer + gh-proxy）──
  extraInitContainers:
    - name: download-vl-plugin
      image: alpine:latest
      command:
        - sh
        - -c
        - |
          apk add --no-cache curl tar
          cd /var/lib/grafana/plugins
          echo "⬇️ Downloading victoriametrics-logs-datasource..."
          curl -sLo plugin.tar.gz \
            "https://gh-proxy.com/https://github.com/VictoriaMetrics/victorialogs-datasource/releases/download/v0.28.0/victoriametrics-logs-datasource-v0.28.0.tar.gz"
          tar -xzf plugin.tar.gz
          rm plugin.tar.gz
          echo "✅ Plugin installed: $(ls victoriametrics-logs-datasource/ | head -5)"
      volumeMounts:
        - name: storage
          mountPath: /var/lib/grafana
