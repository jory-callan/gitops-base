apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: redis-operator
    repo: http://192.168.5.103:8081/repository/helm-hosted/
    version: 0.25.0
    releaseName: redis-operator
    namespace: redis-operator
    valuesFile: values.yaml
    # CRDs 已通过 kubectl apply --server-side 直接安装
    # Helm 方式安装会因 CRD 过大导致 metadata.annotations 超限
    includeCRDs: false
