# ── victorialogs NetworkPolicy ───────────────
# 策略：默认拒绝入站，仅允许 nginx-ingress + 同 namespace 日志采集
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-ingress
  namespace: victorialogs
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-nginx
  namespace: victorialogs
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: victoria-logs
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 9428
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-collector
  namespace: victorialogs
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: victoria-logs
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: victoria-logs-collector
      ports:
        - port: 9428
          protocol: TCP
