# Victoria Logs Helm values
# Referenced by argocd/victoria-logs/application.yaml via $values/apps/victoria-logs/values.yaml
server:
  retentionPeriod: 7
  # 本地索引缓存（2Gi，实际数据存 MinIO S3）
  persistentVolume:
    enabled: true
    storageClassName: nfs-client
    size: 2Gi
    accessModes:
      - ReadWriteOnce
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # S3 后端（MinIO）
  extraArgs:
    s3.endpoint: "http://minio.minio.svc.cluster.local:80"
    s3.accessKey: "vm-storage-user"
    s3.secretKey: "vm-s3k-7c3a1d9e2b5f"
    s3.bucket: "vm-logs"
    s3.region: "us-east-1"

  # ── VictoriaLogs Web UI Ingress ─────────────────────────
  # ingress 在 server 层级下
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: internal-ca
    hosts:
      - name: logs.czw-sre.internal
        path:
          - /
        port: http
    tls:
      - secretName: vl-logs-tls
        hosts:
          - logs.czw-sre.internal
