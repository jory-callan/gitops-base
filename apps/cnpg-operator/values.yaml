# CloudNativePG Operator values (v0.29.0 / app 1.30.0)
# Referenced by apps/cnpg-operator/kustomization.yaml

replicaCount: 1

image:
  repository: ghcr.io/cloudnative-pg/cloudnative-pg
  pullPolicy: IfNotPresent

config:
  data: {}
  # 控制 operator watch 哪些 namespace，空 = 全集群
  clusterWide: true

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

# CRDs 已在部署前通过 kubectl apply --server-side 直接安装
# Helm 方式安装会因 clusters CRD (464KB) / poolers CRD (653KB)
# 过大导致 metadata.annotations 超限 (256KB 限制)
crds:
  create: false

monitoring:
  podMonitorEnabled: false
  # Grafana Dashboard 由 victoria-metrics 统一管理，此处不创建
  grafanaDashboard:
    create: false

# 默认监控查询，使 VMAgent 内置的 PostgreSQL 采集器可直接关联
monitoringQueriesConfigMap:
  create: true
