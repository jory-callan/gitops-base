# ArgoCD Helm values
# Installed via bootstrap (not managed by GitOps)
# Chart version: argo/argo-cd=7.8.2
# Usage: helm upgrade argocd argo/argo-cd -n argocd --version 7.8.2 -f bootstrap/argocd-values.yaml
applicationSet:
  enabled: true
configs:
  params:
    server.insecure: true
dex:
  enabled: false
notifications:
  enabled: false
redis:
  enabled: true
server:
  ingress:
    enabled: true
    ingressClassName: nginx
    hostname: argocd.czw-sre.internal
    annotations:
      cert-manager.io/cluster-issuer: internal-ca
    path: /
    tls: true
  service:
    port: 80
    type: ClusterIP
