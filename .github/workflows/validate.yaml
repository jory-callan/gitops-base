name: Validate GitOps

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: yamllint --no-warnings -d relaxed apps/ argocd/ bootstrap/

  validate-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify ArgoCD Applications match apps/
        run: |
          set -e
          errors=0
          for app_yaml in argocd/*/application.yaml; do
            app_name=$(basename "$(dirname "$app_yaml")")
            app_dir="apps/${app_name}"
            if [ ! -d "$app_dir" ]; then
              echo "ERROR: $app_yaml references path $app_dir but directory does not exist"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "Found $errors structure errors"
            exit 1
          fi
          echo "All ArgoCD applications have matching apps/ directories"

      - name: Verify kustomization.yaml references exist
        run: |
          set -e
          errors=0
          for k in $(find apps/ -name kustomization.yaml); do
            dir=$(dirname "$k")
            for r in $(grep -E '^\s*-\s+\S+\.ya?ml' "$k" | awk '{print $2}'); do
              if [ ! -f "$dir/$r" ]; then
                echo "ERROR: $k references $r but file not found"
                errors=$((errors + 1))
              fi
            done
            for vf in $(grep 'valuesFile:' "$k" | awk '{print $2}'); do
              if [ ! -f "$dir/$vf" ]; then
                echo "ERROR: $k references valuesFile $vf but file not found"
                errors=$((errors + 1))
              fi
            done
          done
          if [ $errors -gt 0 ]; then
            echo "Found $errors reference errors"
            exit 1
          fi
          echo "All kustomization.yaml references are valid"

  build-dryrun:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Kustomize
        uses: fluxcd/pkg/actions/setup-kustomize@v1
        with:
          version: "5.4.2"

      - name: Kustomize build (best-effort)
        run: |
          for dir in $(find apps/ -name kustomization.yaml -exec dirname {} \; | sort -u); do
            echo "--- Building $dir ---"
            if kustomize build --enable-helm "$dir" > /dev/null 2>&1; then
              echo "  OK"
            else
              echo "  SKIPPED (Helm repo unreachable - not blocking)"
            fi
          done
