apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoria-metrics
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: http://192.168.5.103:8081/repository/helm-hosted/
      chart: victoria-metrics-k8s-stack
      targetRevision: 0.85.2
      helm:
        valueFiles:
          - $values/apps/victoria-metrics/values.yaml
    # 原始: https://github.com/jory-callan/gitops-base
    # Go HTTP 客户端不走 gitconfig，需 gh-proxy
    - repoURL: https://gh-proxy.com/https://github.com/jory-callan/gitops-base
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
