apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kite
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: oci://ghcr.io/kite-org/charts
      chart: kite
      targetRevision: 0.12.3
      helm:
        values: |
          image:
            tag: v0.12.3
          deploymentStrategy:
            type: Recreate
          db:
            type: sqlite
            sqlite:
              persistence:
                pvc:
                  enabled: true
                  storageClass: nfs-client
                  size: 1Gi
                mountPath: /data
          ingress:
            enabled: true
            className: nginx
            annotations:
              cert-manager.io/cluster-issuer: internal-ca
            hosts:
              - host: kite.czw-sre.internal
                paths:
                  - path: /
                    pathType: Prefix
            tls:
              - hosts:
                  - kite.czw-sre.internal
                secretName: kite-tls
          service:
            type: ClusterIP
    - repoURL: https://github.com/jory-callan/gitops-base
      targetRevision: HEAD
      path: apps/kite
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
