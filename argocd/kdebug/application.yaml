apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kdebug
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jory-callan/gitops-base
    targetRevision: HEAD
    path: apps/kdebug
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
