apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoria-logs
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://192.168.5.103:8081/repository/helm-hosted/
    chart: victoria-logs-single
    targetRevision: 0.13.8
    helm:
      values: |
        server:
          retentionPeriod: 7
          persistentVolume:
            enabled: true
            storageClassName: nfs-client
            size: 10Gi
            accessModes:
              - ReadWriteOnce
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: victorialogs
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
