apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metrics-server
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: http://192.168.5.103:8081/repository/helm-hosted/
      chart: metrics-server
      targetRevision: 3.13.1
      helm:
        valueFiles:
          - $values/apps/metrics-server/values.yaml
    - repoURL: https://github.com/jory-callan/gitops-base
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
