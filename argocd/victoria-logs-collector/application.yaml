apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoria-logs-collector
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: http://192.168.5.103:8081/repository/helm-hosted/
      chart: victoria-logs-collector
      targetRevision: 0.3.6
      helm:
        valueFiles:
          - $values/apps/victoria-logs-collector/values.yaml
    - repoURL: https://github.com/jory-callan/gitops-base
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: victorialogs
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
