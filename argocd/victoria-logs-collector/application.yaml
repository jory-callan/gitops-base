apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoria-logs-collector
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jory-callan/gitops-base
    targetRevision: HEAD
    path: apps/victoria-logs-collector
  destination:
    server: https://kubernetes.default.svc
    namespace: victorialogs
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
