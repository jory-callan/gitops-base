apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoria-logs-collector
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://192.168.5.103:8081/repository/helm-hosted/
    chart: victoria-logs-collector
    targetRevision: 0.3.6
    helm:
      values: |
        remoteWrite:
          - url: http://victoria-logs-victoria-logs-single-server.victorialogs.svc:9428
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: victorialogs
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
