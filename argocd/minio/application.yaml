apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://gh-proxy.com/https://github.com/jory-callan/gitops-base
    targetRevision: HEAD
    path: apps/minio
  destination:
    server: https://kubernetes.default.svc
    namespace: minio
  ignoreDifferences:
    - group: minio.min.io
      kind: Tenant
      jsonPointers:
        - /spec/livenessProbe
        - /spec/readinessProbe
        - /spec/startupProbe
        - /spec/terminationGracePeriodSeconds
        - /spec/metadata
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
